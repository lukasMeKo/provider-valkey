name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  RUNTIME_IMAGE: ghcr.io/${{ github.repository_owner }}/provider-valkey-runtime
  XPKG_IMAGE: ghcr.io/${{ github.repository_owner }}/provider-valkey

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-latest:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build provider binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/linux_amd64/provider ./cmd/provider
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o bin/linux_arm64/provider ./cmd/provider

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.RUNTIME_IMAGE }}:latest

      - name: Install crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build and push xpkg
        run: |
          crossplane xpkg build \
            --package-root=./package \
            --embed-runtime-image=${{ env.RUNTIME_IMAGE }}:latest \
            --output=provider-valkey.xpkg
          crossplane xpkg push \
            --package-files=provider-valkey.xpkg \
            ${{ env.XPKG_IMAGE }}:latest

  publish-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build provider binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/linux_amd64/provider ./cmd/provider
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o bin/linux_arm64/provider ./cmd/provider

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.RUNTIME_IMAGE }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.RUNTIME_IMAGE }}:latest

      - name: Install crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build and push xpkg
        run: |
          crossplane xpkg build \
            --package-root=./package \
            --embed-runtime-image=${{ env.RUNTIME_IMAGE }}:${{ needs.release-please.outputs.tag_name }} \
            --output=provider-valkey.xpkg
          crossplane xpkg push \
            --package-files=provider-valkey.xpkg \
            ${{ env.XPKG_IMAGE }}:${{ needs.release-please.outputs.tag_name }}
          crossplane xpkg push \
            --package-files=provider-valkey.xpkg \
            ${{ env.XPKG_IMAGE }}:latest
