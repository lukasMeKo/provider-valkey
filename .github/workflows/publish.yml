name: publish

on:
  push:
    branches:
      - main
  release:
    types:
      - created

permissions:
  packages: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      runtime_image: ${{ steps.images.outputs.runtime_image }}
      xpkg_image: ${{ steps.images.outputs.xpkg_image }}
    steps:
      - name: Compute image names
        id: images
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "runtime_image=ghcr.io/${owner}/provider-valkey-runtime" >> "$GITHUB_OUTPUT"
          echo "xpkg_image=ghcr.io/${owner}/provider-valkey" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: config
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.config.outputs.runtime_image }}:${{ github.sha }}
            ${{ needs.config.outputs.runtime_image }}:latest

      - name: Install crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
          sudo mv crossplane /usr/local/bin/crossplane

      - name: Build and push xpkg
        run: |
          crossplane xpkg build \
            --package-root=./package \
            --embed-runtime-image=${{ needs.config.outputs.runtime_image }}:${{ github.sha }} \
            --package-file=provider-valkey.xpkg
          crossplane xpkg push \
            -f provider-valkey.xpkg \
            ${{ needs.config.outputs.xpkg_image }}:${{ github.sha }}
          crossplane xpkg push \
            -f provider-valkey.xpkg \
            ${{ needs.config.outputs.xpkg_image }}:latest

  tag-release:
    runs-on: ubuntu-latest
    needs: [config, build-and-push]
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Tag images with release version
        run: |
          crane tag ${{ needs.config.outputs.runtime_image }}:${{ github.sha }} ${{ github.ref_name }}
          crane tag ${{ needs.config.outputs.xpkg_image }}:${{ github.sha }} ${{ github.ref_name }}
